openapi: 3.0.3
info:
  title: Patient Management Project API
  version: 1.0.0
  description: API documentation for the Patient Management Project
paths:
  /api/patients/:
    get:
      operationId: patients_list
      description: A simple ViewSet for listing or retrieving patients.
      tags:
      - patients
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PatientRecord'
          description: ''
    post:
      operationId: patients_create
      description: A simple ViewSet for listing or retrieving patients.
      tags:
      - patients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatientRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatientRecord'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientRecord'
          description: ''
  /api/patients/{id}/:
    get:
      operationId: patients_retrieve
      description: A simple ViewSet for listing or retrieving patients.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this patient record.
        required: true
      tags:
      - patients
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientRecord'
          description: ''
    put:
      operationId: patients_update
      description: A simple ViewSet for listing or retrieving patients.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this patient record.
        required: true
      tags:
      - patients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatientRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatientRecord'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientRecord'
          description: ''
    patch:
      operationId: patients_partial_update
      description: A simple ViewSet for listing or retrieving patients.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this patient record.
        required: true
      tags:
      - patients
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPatientRecord'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPatientRecord'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPatientRecord'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientRecord'
          description: ''
    delete:
      operationId: patients_destroy
      description: A simple ViewSet for listing or retrieving patients.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this patient record.
        required: true
      tags:
      - patients
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    GenderEnum:
      enum:
      - M
      - F
      type: string
      description: |-
        * `M` - Male
        * `F` - Female
    PatchedPatientRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          nullable: true
          maxLength: 255
        middle_name:
          type: string
          maxLength: 255
        gender:
          $ref: '#/components/schemas/GenderEnum'
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
    PatientRecord:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          maxLength: 255
        last_name:
          type: string
          nullable: true
          maxLength: 255
        middle_name:
          type: string
          maxLength: 255
        gender:
          $ref: '#/components/schemas/GenderEnum'
        age:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
      required:
      - age
      - first_name
      - gender
      - id
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
