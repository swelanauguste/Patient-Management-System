name: patient-management-system
services:
  ui:
    command:
      - sh
      - -c
      - npm install && npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      web:
        condition: service_started
        required: true
    image: node:20-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5173
        published: "5173"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/swelanauguste/Developer/Patient-Management-System/paitent-crud-ui
        target: /usr/src/ui
        bind: {}
      - type: volume
        target: /usr/src/ui/node_modules
        volume: {}
    working_dir: /usr/src/ui
  web:
    build:
      context: /Users/swelanauguste/Developer/Patient-Management-System/app
      dockerfile: Dockerfile
    command:
      - python
      - manage.py
      - runserver
      - 0.0.0.0:8000
    expose:
      - 8000
    env_file:
      - ./.env
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8000
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/swelanauguste/Developer/Patient-Management-System/app
        target: /usr/src/app
        bind: {}
  db:
    image: postgres:17-bookworm
    container_name: patient_management_system
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5
      timeout: 5s
networks:
  default:
    name: patient-management-system_default

volumes:
  postgres_data: